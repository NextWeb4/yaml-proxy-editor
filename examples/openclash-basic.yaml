mixed-port: 7890
allow-lan: true
mode: rule
log-level: info
external-controller: 127.0.0.1:9090
dns:
  enable: true
  enhanced-mode: fake-ip
  nameserver:
    - 223.5.5.5
    - 119.29.29.29
  fallback:
    - 1.1.1.1
    - 8.8.8.8
  fallback-filter:
    geoip: true
    geoip-code: CN
proxies:
  - name: HK-01 1x
    type: ss
    server: hk.example.local
    port: 443
    cipher: aes-128-gcm
    password: example
proxy-groups:
  - name: 节点选择
    type: select
    proxies:
      - HK-01 1x
      - DIRECT
rules:
  - DOMAIN-SUFFIX,openai.com,节点选择
  - GEOIP,CN,DIRECT
  - MATCH,节点选择

